services:
  # 1. בסיס הנתונים MongoDB
  mongodb:
    image: mongo:4.4
    container_name: flight_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. השרת האחורי (Server)
  server:
    build: ./server
    container_name: flight_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/flight-monitor
    depends_on:
      - mongodb

  # 3. ממשק המשתמש (Client)
  client:
    build: ./client
    container_name: flight_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data: